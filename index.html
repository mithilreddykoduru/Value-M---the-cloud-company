<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>Value M - The Cloud Technology</title>
    <!-- Google Fonts: Inter for Apple-like typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', 'sans-serif'],
            },
            colors: {
              'brand-dark': '#000000', // Apple Pro Black
              'brand-card': '#1d1d1f', // Apple Pro Card Gray

              'brand-secondary': '#86868b', // Apple Secondary Gray
              'brand-accent': '#2997ff', // Apple Light Blue

            animation: {
              'gradient-x': 'gradient-x 15s ease infinite',

            keyframes: {
              'gradient-x': {
                '0%, 100%': {
                  'background-size': '200% 200%',
                  'background-position': 'left center',

                '50%': {
                  'background-size': '200% 200%',

            },
          },
        },

    <script type="importmap">
